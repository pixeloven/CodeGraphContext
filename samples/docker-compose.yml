# CGC Sample Applications — full pipeline demo.
#
# Extends the plugin stack (Neo4j + OTEL Collector + OTEL Processor) and adds
# three sample apps: PHP/Laravel, Python/FastAPI, TypeScript/Express gateway.
#
# Usage:
#   cd samples/
#   docker compose up -d --build
#   docker compose run --rm indexer    # one-shot: indexes all sample apps
#   bash smoke-all.sh
#
# Neo4j Browser: http://localhost:7474
# PHP app:       http://localhost:8080/api/orders
# Python app:    http://localhost:8081/api/orders
# TS gateway:    http://localhost:8082/api/dashboard

include:
  - path: ../docker-compose.plugin-stack.yml
  - path: ../docker-compose.dev.yml

services:

  # ── PHP/Laravel sample (OTEL + Xdebug) ────────────────────────────────────
  sample-php:
    build:
      context: ./php-laravel
      dockerfile: Dockerfile
    container_name: cgc-sample-php
    environment:
      - OTEL_PHP_AUTOLOAD_ENABLED=true
      - OTEL_SERVICE_NAME=sample-php
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - APP_KEY=${APP_KEY:-base64:dGhpc2lzYXRlc3RrZXlmb3JzYW1wbGVhcHBzMTIzNA==}
    ports:
      - "8080:8080"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - cgc-network
    restart: unless-stopped

  # ── Python/FastAPI sample (OTEL) ───────────────────────────────────────────
  sample-python:
    build:
      context: ./python-fastapi
      dockerfile: Dockerfile
    container_name: cgc-sample-python
    environment:
      - OTEL_SERVICE_NAME=sample-python
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
    ports:
      - "8081:8081"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - cgc-network
    restart: unless-stopped

  # ── TypeScript/Express gateway (OTEL cross-service) ────────────────────────
  sample-ts-gateway:
    build:
      context: ./ts-express-gateway
      dockerfile: Dockerfile
    container_name: cgc-sample-ts-gateway
    environment:
      - OTEL_SERVICE_NAME=sample-ts-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - PHP_BACKEND_URL=http://sample-php:8080
      - PYTHON_BACKEND_URL=http://sample-python:8081
    ports:
      - "8082:8082"
    depends_on:
      sample-php:
        condition: service_started
      sample-python:
        condition: service_started
      otel-collector:
        condition: service_started
    networks:
      - cgc-network
    restart: unless-stopped

  # ── Hosted MCP server (HTTP transport, optional) ──────────────────────────
  # Serves the Model Context Protocol over HTTP on port 8045.
  # This is an alternative to the stdio-based local MCP mode used by IDEs.
  # It is NOT started by default — activate with the "mcp" profile:
  #
  #   docker compose --profile mcp up -d cgc-mcp
  #
  # Connect AI clients to http://localhost:8045/mcp
  # See docs/docs/deployment/MCP_SERVER_HOSTING.md for full details.
  cgc-mcp:
    build:
      context: ..
      dockerfile: ../Dockerfile.mcp
    container_name: cgc-sample-mcp
    environment:
      - DATABASE_TYPE=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codegraph123}
      - CGC_CORS_ORIGIN=${CGC_CORS_ORIGIN:-*}
      - CGC_MCP_PORT=${CGC_MCP_PORT:-8045}
    ports:
      - "${CGC_MCP_PORT:-8045}:8045"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - cgc-network
    restart: unless-stopped
    profiles:
      - mcp

  # ── One-shot indexer (indexes all sample apps then exits) ──────────────────
  # Usage: docker compose run --rm indexer
  indexer:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - DATABASE_TYPE=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-codegraph123}
    volumes:
      - ../:/workspace
    entrypoint: ["/bin/sh", "-c"]
    command: ["echo 'Indexing PHP/Laravel...' && cgc index /workspace/samples/php-laravel && echo 'Indexing Python/FastAPI...' && cgc index /workspace/samples/python-fastapi && echo 'Indexing TypeScript/Express...' && cgc index /workspace/samples/ts-express-gateway && echo 'Done — all sample apps indexed.'"]
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - cgc-network
    profiles:
      - indexer
