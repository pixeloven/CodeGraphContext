apiVersion: apps/v1
kind: Deployment
metadata:
  name: cgc-otel-processor
  labels:
    app: cgc-otel-processor
    app.kubernetes.io/part-of: codegraphcontext
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cgc-otel-processor
  template:
    metadata:
      labels:
        app: cgc-otel-processor
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: cgc-otel-processor
          image: ghcr.io/codegraphcontext/cgc-plugin-otel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc-receiver
              containerPort: 5317
              protocol: TCP
          env:
            - name: NEO4J_URI
              valueFrom:
                configMapKeyRef:
                  name: cgc-config
                  key: NEO4J_URI
            - name: NEO4J_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: cgc-config
                  key: NEO4J_USERNAME
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cgc-secrets
                  key: NEO4J_PASSWORD
            - name: OTEL_RECEIVER_PORT
              value: "5317"
            - name: LOG_LEVEL
              value: "INFO"
          readinessProbe:
            exec:
              command: ["python", "-c", "import grpc; print('ok')"]
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["python", "-c", "import grpc; print('ok')"]
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
